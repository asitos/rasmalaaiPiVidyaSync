name: strict-monorepo-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  daemon-engine:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: initialize python runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r daemon/requirements.txt
        pip install flake8
    - name: enforce static syntax checks
      run: |
        flake8 daemon/ --count --select=E9,F63,F7,F82 --show-source --statistics

  edge-renderer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
    - uses: actions/checkout@v4
    - name: initialize node runtime
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './api/package-lock.json'
    - name: install dependencies
      run: npm ci
    - name: strict typecheck and dom compilation
      run: npm run build
